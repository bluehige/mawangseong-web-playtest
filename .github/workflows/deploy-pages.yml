name: Deploy playtest to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out playtest
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate Godot export
        shell: bash
        run: |
          test -f index.html
          test -f index.js
          test -f index.pck
          test -f index.wasm
          test "$(stat -c '%s' index.pck)" -eq 231378308
          test "$(stat -c '%s' index.wasm)" -eq 38047590
          grep -aFq "management_castle_bustle.wav" index.pck
          grep -aFq "combat_boss_council.wav" index.pck
          grep -aFq "fireball.wav" index.pck

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        shell: bash
        run: |
          mkdir _site
          cp index.html index.js index.pck index.wasm index.png \
            index.icon.png index.apple-touch-icon.png \
            index.audio.position.worklet.js index.audio.worklet.js \
            .nojekyll _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
